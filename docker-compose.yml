services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - db-data:/app/data
    environment:
      - PORT=4000
      - DB_PATH=/app/data/catalog.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data: